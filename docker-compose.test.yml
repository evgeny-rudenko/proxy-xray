services:
  proxy-client-test:
    image: proxy-xray:local
    depends_on:
      - proxy-xray
    entrypoint: ["/bin/sh", "/tests/client-smoke.sh"]
    environment:
      PROXY_HOST: proxy-xray
      SOCKS_PORT: "1080"
      HTTP_PORT: "8123"
      VLESS_PORT: "10086"
      STATUS_PORT: "18080"
      VLESS_ID: "11111111-1111-4111-8111-111111111111"
      MIN_SPEED_KBPS: "1000"
    volumes:
      - ./assets:/opt/proxy-xray/assets:ro
      - ./tests:/tests:ro
